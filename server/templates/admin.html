<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品报价规则</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>产品报价规则</h1>
      <span class="muted" id="userInfo"></span>
    </div>
    <div class="topbar-right">
      <a class="ghost" href="/admin/industries">行业匹配</a>
      <a class="ghost" href="/">销售生成器</a>
      <button class="ghost" id="changeLogBtn">变更记录</button>
      <button class="ghost" id="logoutBtn">退出</button>
    </div>
  </header>

  <main class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-head">
        <span>场景</span>
        <button class="primary small" id="addProductBtn">+ 新增产品</button>
      </div>
      <ul class="scenario-list" id="scenarioList"></ul>
      <div class="sidebar-section">
        <div class="sidebar-head"><span>销售上报缺失</span></div>
        <ul class="missing-list" id="missingList"><li class="muted">暂无</li></ul>
      </div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <input id="searchInput" placeholder="搜索产品名">
        <button class="ghost danger" id="batchDeleteBtn">批量删除</button>
        <button class="ghost" id="batchCancelBtn" hidden>取消</button>
      </div>
      <div class="pagination-bar" aria-label="产品分页">
        <span class="page-summary" id="countText"></span>
        <div class="pagination-controls">
          <label class="page-size-control">
            <span>每页</span>
            <select id="pageSizeSelect" aria-label="每页行数">
              <option value="10" selected>10 行</option>
              <option value="20">20 行</option>
              <option value="50">50 行</option>
              <option value="100">100 行</option>
            </select>
          </label>
          <div class="page-controls">
            <button class="ghost small" id="prevPageBtn" type="button">上一页</button>
            <span class="page-info" id="pageInfo">第 1 / 1 页</span>
            <button class="ghost small" id="nextPageBtn" type="button">下一页</button>
          </div>
        </div>
      </div>
      <div class="rule-table-wrap">
        <table class="rule-table">
          <colgroup>
            <col style="width:32px">
            <col style="width:34%">
            <col style="width:40%">
            <col style="width:18%">
            <col style="width:112px">
          </colgroup>
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="selectAll" title="全选当前页"></th>
              <th class="col-name">产品名称</th>
              <th>报价规则</th>
              <th>说明 / 最近调整</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="ruleTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="productDialog">
    <form method="dialog" id="productForm">
      <h2 id="dialogTitle">新增产品</h2>
      <label>
        <span>产品名称</span>
        <input id="dlgName" required>
      </label>
      <label>
        <span>所属场景</span>
        <select id="dlgScenario" required></select>
      </label>
      <label>
        <span>别名（逗号分隔）</span>
        <input id="dlgAliases" placeholder="例如：海螺,hailuo">
      </label>
      <div class="dialog-actions">
        <button type="button" value="cancel" class="ghost" id="dlgCancel" formnovalidate>取消</button>
        <button type="submit" value="confirm" class="primary" id="dlgSubmit">保存产品</button>
      </div>
    </form>
  </dialog>

  <script src="{{ url_for('static', filename='change_log.js') }}"></script>
  <script src="{{ url_for('static', filename='admin.js') }}"></script>
</body>
</html>
